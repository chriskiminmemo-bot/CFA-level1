<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0f0e0c"/>
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </linearGradient>
  </defs>
  <!-- Border ring -->
  <rect x="20" y="20" width="472" height="472" rx="66" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.4"/>
  <!-- CFA text -->
  <text x="256" y="230" font-family="Georgia, serif" font-size="148" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="4">CFA</text>
  <!-- Level I -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="64" fill="#e8c97a" text-anchor="middle" letter-spacing="8" opacity="0.9">LEVEL I</text>
  <!-- 2025 -->
  <text x="256" y="390" font-family="'Courier New', monospace" font-size="38" fill="#6b6358" text-anchor="middle" letter-spacing="6">2025</text>
  <!-- Decorative lines -->
  <line x1="80" y1="345" x2="176" y2="345" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <line x1="336" y1="345" x2="432" y2="345" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
</svg>
